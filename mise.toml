[tools]
node = "latest"
# zig + cargo-zigbuild are pinned to the versions proven by the successful
# v0.27.0 release (run 28709228045). `latest` is how cargo-zigbuild 0.23.0
# silently broke the Release workflow (its cargo-options bump dropped the
# CARGO_BUILD_TARGET env binding); pinning makes toolchain
# upgrades deliberate PRs (bump here, watch the release dry-run) instead of
# ambient breakage at release time.
zig = "0.16.0"
"cargo:cargo-zigbuild" = "0.23.0"

[env]
PGPORT = "5436"
PGDATABASE = "cipherstash"
PGUSER = "cipherstash"
PGPASSWORD = "password"
PGHOST = "localhost"

[task_config]
includes = [
  "integration-tests/tasks.toml",
]

[tasks."build:debug"]
description = "Build the project in debug mode"
run = "npm run debug"

[tasks."lint:rust"]
description = "cargo clippy with all features and no dependencies, includes tests"
run = "cargo clippy --no-deps --tests --all-features --all-targets -- -D warnings"

[tasks."fmt"]
description = "Format code with rustfmt"
run = "cargo fmt"
