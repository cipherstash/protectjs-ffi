[start-db]
description = "Start a local Postgres database in a Docker container"
dir = "{{ config_root }}/integration-tests"
run = """
docker compose up --wait --detach

# wait till postgres is ready
printf "Waiting for postgres to be ready..."
until pg_isready -q -h ${PGHOST} -U ${PGUSER} -p ${PGPORT}; do
    printf "."
    sleep 0.1
done
echo "done"
"""

["eql:download"]
description = "Download CipherStash encrypt SQL"
dir = "{{ config_root }}/integration-tests"
run = "curl -sLo sql/cipherstash-encrypt.sql https://github.com/cipherstash/encrypt-query-language/releases/download/eql-2.2.1/cipherstash-encrypt.sql"

["eql:install"]
description = "Install CipherStash encrypt SQL into the database"
dir = "{{ config_root }}/integration-tests"
run = "cat sql/cipherstash-encrypt.sql | docker exec -i protect-ffi-postgres psql postgresql://cipherstash:password@postgres:5432/cipherstash -f-"

# The eql_v3 schema has no release artifact yet, so the installer is a
# COMMITTED snapshot (sql/cipherstash-encrypt-v3.sql — the one exception to
# the cipherstash-*.sql gitignore rule) built from the EQL repo's `eql_v3`
# branch. That is what CI and checkout-only contributors install. This task
# REFRESHES the snapshot from a sibling encrypt-query-language checkout
# (`mise run build` there writes the self-contained eql_v3 installer to
# release/cipherstash-encrypt.sql); commit the diff when the eql_v3 branch
# moves. Skips with a warning when the sibling checkout is absent — the
# committed snapshot is used as-is.
["eql:v3:build"]
description = "Refresh the committed EQL v3 SQL snapshot from a sibling encrypt-query-language checkout"
dir = "{{ config_root }}/integration-tests"
run = """
if [ ! -d ../../encrypt-query-language ]; then
    echo "warning: ../../encrypt-query-language not found — using the committed EQL v3 snapshot as-is"
    exit 0
fi
(cd ../../encrypt-query-language && mise run build)
cp ../../encrypt-query-language/release/cipherstash-encrypt.sql sql/cipherstash-encrypt-v3.sql
"""

["eql:v3:install"]
description = "Install the EQL v3 SQL into the database"
dir = "{{ config_root }}/integration-tests"
run = """
if [ ! -f sql/cipherstash-encrypt-v3.sql ]; then
    echo "warning: sql/cipherstash-encrypt-v3.sql not found — skipping EQL v3 install (the snapshot is committed; check the working tree)"
    exit 0
fi
cat sql/cipherstash-encrypt-v3.sql | docker exec -i protect-ffi-postgres psql postgresql://cipherstash:password@postgres:5432/cipherstash -f-
"""

[setup]
description = "Set up the integration test environment"
dir = "{{ config_root }}/integration-tests"
run = [
    "npm ci",
    "mise run start-db",
    "mise run eql:download",
    "mise run eql:install",
    "mise run eql:v3:build",
    "mise run eql:v3:install",
]

["test:integration"]
description = "Run the integration tests"
dir = "{{ config_root }}/integration-tests"
depends = ["start-db"]
# The wasm-round-trip suite reads `dist/wasm/protect_ffi_inline.js`, so
# the wasm artifacts must exist before vitest runs even though the rest
# of the integration tests only need the Neon binding.
run = [
    "mise run build:debug",
    "npm run --prefix .. build:wasm",
    "npx vitest --exclude tests/lock-context.test.ts",
]

["test:integration:all"]
description = "Run all integration tests (includes lock context tests)"
dir = "{{ config_root }}/integration-tests"
depends = ["start-db"]
run = [
    "mise run build:debug",
    "npm run --prefix .. build:wasm",
    "npx vitest",
]
